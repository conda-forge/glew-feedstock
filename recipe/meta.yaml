{% set version = "2.2.0" %}

package:
  name: glew
  version: {{ version }}

source:
  url: https://github.com/nigels-com/glew/releases/download/glew-{{ version }}/glew-{{ version }}.tgz
  sha256: d4fc82893cfb00109578d0a1a2337fb8ca335b3ceccf97b97e5cc7f08e4353e1
  patches:
    - CMakeLists.patch  # [win and vc<14]

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('glew', max_pin='x.x') }}

requirements:
  build:
    - {{ stdlib("c") }}
    - {{ compiler("c") }}
    - cmake
    - make                               # [unix]
    - pkg-config                         # [unix]
  host:
    - libgl-devel                    # [linux]
    - libglu                         # [linux]
    - xorg-libx11                    # [linux]
    - xorg-xorgproto                 # [linux]
  run:
    # you need the libglu headers at runtime, but not at compile time...
    - libglu                         # [linux]
    - xorg-libx11                    # [linux]
    - xorg-libxext                   # [linux]

# Tests require visual context not present on CIs
test:
  requires:
    # Not sure why we need cxx...
    - {{ compiler("cxx") }}
    - {{ compiler("c") }}
    - cmake
    - make                           # [unix]
    - libgl-devel                    # [linux]
  commands:
    - test -f $PREFIX/include/GL/glew.h            # [unix]
    - if not exist %LIBRARY_INC%\GL\glew.h exit 1  # [win]
    # These executables fail with a non-0 return because there is no visual context available in CI
    - which visualinfo   # [unix]
    - which glewinfo     # [unix]
    - where visualinfo   # [win]
    - where glewinfo     # [win]

about:
  home: http://glew.sourceforge.net/
  license: BSD-3-Clause
  license_file: LICENSE.txt
  summary: "The OpenGL Extension Wrangler Library"
  description: |
    The OpenGL Extension Wrangler Library (GLEW) is a cross-platform open-source C/C++
    extension loading library. GLEW provides efficient run-time mechanisms for determining
    which OpenGL extensions are supported on the target platform. OpenGL core and extension
    functionality is exposed in a single header file.
  doc_url: http://glew.sourceforge.net/basic.html
  dev_url: https://github.com/nigels-com/glew

extra:
  recipe-maintainers:
    - dschreij
    - edisongustavo
